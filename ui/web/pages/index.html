<!DOCTYPE html>
<html id="almodon" lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="/toolkit/assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/toolkit/style/almodon.css">

    {{ block "head" . }}{{ end }}

    <title>Sistema de Gestão do Almoxarifado interno da Odontologia</title>
</head>

<body id="{{ block `body-id` . }}root{{ end }}">
    <header>
        <a class="logo" href="/">
            <img src="/toolkit/assets/almodon.png" alt="Almodonte">
            <span class="text bold">Almodon</span>
        </a>

        {{ block "nav" . }}<nav></nav>{{ end }}
    </header>

    {{ block "main" . }}<main></main>{{ end }}
</body>

</html>
