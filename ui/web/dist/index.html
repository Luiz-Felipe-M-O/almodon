<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <link rel="shortcut icon" href="./assets/icon.png" type="image/x-icon">
    <link rel="manifest" href="manifest.json?v=0.0.1">
    <title>Gestão Interna do Almoxarifado da Odontologia</title>

    <script type="module" src="./script/main.js?v=0.0.1"></script>
    <link rel="stylesheet" href="./style/index.css?v=0.0.1">
</head>

<body class="root scrollable">
    <div class="complete" id="progress">
        <div class="bar"></div>
    </div>

    <aside id="sidebar">
        <header id="header">
            <a class="brand" href="./">
                <img class="logo" src="./assets/logo.png" alt="Logo">
            </a>
        </header>

        <nav class="options scrollable" id="nav">
            <div role="button" tabindex="0" class="soft-button option" data-namespace="home">
                <img class="icon" src="./assets/icons/home.svg">
                <div>Página Inicial</div>
            </div>

            <div role="button" tabindex="0" class="soft-button option" data-namespace="users">
                <img class="icon" src="./assets/icons/group.svg">
                <div>Usuários</div>
            </div>

            <div role="button" tabindex="0" class="soft-button option" data-namespace="users-2">
                <img class="icon" src="./assets/icons/group.svg">
                <div>Usuários</div>
            </div>

            <div role="button" tabindex="0" class="soft-button option" data-namespace="about">
                <img class="icon" src="./assets/icons/about.svg">
                <div id="turn-off">Sobre</div>
            </div>

            <div role="button" tabindex="0" class="soft-button option profile">
                <img class="icon" src="./assets/icons/account.svg">
                <div>Json da Silva</div>
            </div>
        </nav>

        <menu class="menu">
            <div role="button" tabindex="0" class="soft-button option profile">
                <img class="icon" src="./assets/icons/account.svg">
                <div>Json da Silva</div>
            </div>
        </menu>
    </aside>

    <main class="scrollable" id="main"></main>
</body>

</html>
