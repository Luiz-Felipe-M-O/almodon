<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <link rel="shortcut icon" href="./assets/icon.png" type="image/x-icon">
    <link rel="manifest" href="./app/manifest.json">

    <script type="module" src="./script/main.js?v=0.0.2"></script>
    <link rel="stylesheet" href="./style/index.css?v=0.0.1">

    <title>Gestão do Almoxarifado interno da Odontologia</title>
</head>

<body class="root scrollable">
    <div class="complete" id="progress">
        <div class="bar"></div>
    </div>

    <aside id="sidebar">
        <header id="header">
            <a tabindex="0" class="brand" href="./">
                <img class="logo" src="./assets/logo.png" alt="Logo">
            </a>
        </header>

        <nav class="options scrollable" id="nav">
            <button tabindex="0" class="button soft option" data-namespace="home">
                <img class="icon" src="./assets/icons/home.svg">
                <div>Página Inicial</div>
            </button>

            <button tabindex="0" class="button soft option" data-namespace="users">
                <img class="icon" src="./assets/icons/group.svg">
                <div>Usuários</div>
            </button>

            <button tabindex="0" class="button soft option" data-namespace="about">
                <img class="icon" src="./assets/icons/about.svg">
                <div id="turn-off">Sobre</div>
            </button>

            <button tabindex="0" class="button soft option profile" data-namespace="profile">
                <img class="icon" src="./assets/icons/account.svg">
                <div class="name">Json da Silva</div>
            </button>
        </nav>

        <menu class="menu">
            <button tabindex="0" class="button soft option profile" data-namespace="profile">
                <img class="icon" src="./assets/icons/account.svg">
                <div class="name">Entrar</div>
            </button>
        </menu>
    </aside>

    <main class="scrollable" id="main"></main>
</body>

</html>
