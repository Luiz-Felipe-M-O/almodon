<!DOCTYPE html>
<html id="almodon" lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/toolkit/assets/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="/toolkit/style/almodon.css">
    {{ block "head" . }}{{ end }}

    <title>Sistema de Gestão do Almoxarifado interno da Odontologia</title>
</head>

<body id="root">
    <header>
        <a class="logo" href="/">
            <figure>
                <img src="/toolkit/assets/logo.png" alt="Almodonte">
            </figure>

            <span class="text bold">Almodon</span>
        </a>

        <nav>{{ block "nav" . }}{{ end }}</nav>
    </header>

    <main>{{ block "main" . }}{{ end }}</main>
</body>

</html>
