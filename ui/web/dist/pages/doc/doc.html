{{ define "head" }}<link rel="stylesheet" href="/toolkit/style/doc.css">{{ end }}

{{ define "main" }}
<main id="end-points">
    <aside>
        <ul>
            {{ range .EndPoints }}
            <li>
                <a class="route" href="#{{ .RouteID }}">
                    <h2 class="method {{ lower .Method }}">{{ .Method }}</h2>
                    <span class="path">{{ .Path }}</span>
                </a>
            </li>
            {{ end }}
        </ul>
    </aside>

    <section class="main">
        <h2 class="title">{{ .Title }}</h2>
        {{ range .EndPoints }}
        <section class="end-point" id="{{ .RouteID }}">
            <div class="route">
                <h3 class="method {{ lower .Method }}">{{ .Method }}</h3>
                <span class="path">{{ .Path }}</span>
            </div>
            <div class="content">{{ .Body }}</div>
        </section>
        {{ end }}
    </section>
</main>
{{ end }}
