{{ define "head" }}
<link rel="stylesheet" href="/toolkit/style/doc.css">{{ end }}

{{ define "body-id" }}documentation{{ end }}

{{ define "main" }}
<main id="reference">
    <h2 class="title">{{ .Title }}</h2>
    {{ with .Docs }}
    <menu>
        {{ range . }}
        <li>
            <details class="box">
                <summary class="heading">
                    <a class="reference" href="{{ printf `./%s` .Path }}">
                        <h3 class="domain">{{ .Title }}</h3>
                        <span>{{ printf `/%s/` .Path }}</span>
                    </a>
                </summary>

                <div class="content">{{ .Descript }}</div>
            </details>
        </li>
        {{ end }}
    </menu>
    {{ else }}
    <h3 class="empty">No Documented Endpoints</h3>
    {{ end }}
</main>
{{ end }}
