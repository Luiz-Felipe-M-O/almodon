version: "2"
sql:
  - schema: "db/schema.sql"  # Onde está a estrutura do banco 
    queries: "db/query.sql"  # Onde vamos escrever as queries 
    engine: "postgresql"
    gen:
      go:
        package: "db"        # O nome do pacote Go gerado
        out: "db"            # A pasta onde os arquivos Go serão salvos
        sql_package: "pgx/v5" 